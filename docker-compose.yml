services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:delegated
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: news
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: news
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./news.sql:/docker-entrypoint-initdb.d/news.sql

volumes:
  db_data: